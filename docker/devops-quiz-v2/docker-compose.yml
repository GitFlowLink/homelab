services:
  backend:
    build: ./backend
    container_name: quiz-api
    restart: unless-stopped
    volumes:
      - quiz-data:/data

  frontend:
    image: nginx:alpine
    container_name: quiz-web
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  quiz-data:
